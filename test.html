<!DOCTYPE html>
<html lang="cs">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Test: Mouse Arena</title>
	<style>
		:root {
			--bg-1: #f7f4ea;
			--bg-2: #e4efe9;
			--ink: #15251f;
			--ink-soft: #496159;
			--accent: #0f766e;
			--accent-dark: #115e59;
			--danger: #e11d48;
			--good: #15803d;
			--card: rgba(255, 255, 255, 0.75);
			--line: rgba(21, 37, 31, 0.12);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: "Trebuchet MS", "Segoe UI", sans-serif;
			color: var(--ink);
			background:
				radial-gradient(80% 60% at 100% 0%, #b9e4dc 0%, transparent 70%),
				radial-gradient(70% 60% at 0% 100%, #f9d9be 0%, transparent 65%),
				linear-gradient(140deg, var(--bg-1), var(--bg-2));
			display: grid;
			place-items: center;
			padding: 16px;
		}

		.shell {
			width: min(980px, 100%);
			border: 1px solid var(--line);
			border-radius: 24px;
			overflow: hidden;
			box-shadow: 0 20px 50px rgba(20, 40, 35, 0.18);
			background: var(--card);
			backdrop-filter: blur(5px);
		}

		.top {
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			justify-content: space-between;
			gap: 12px;
			padding: 16px 18px;
			border-bottom: 1px solid var(--line);
			background: rgba(255, 255, 255, 0.6);
		}

		.title {
			margin: 0;
			font-size: clamp(1.1rem, 2.3vw, 1.5rem);
			letter-spacing: 0.03em;
			text-transform: uppercase;
		}

		.stats {
			display: flex;
			gap: 8px;
			flex-wrap: wrap;
		}

		.chip {
			padding: 8px 12px;
			border-radius: 999px;
			font-weight: 700;
			font-size: 0.9rem;
			background: #ffffff;
			border: 1px solid var(--line);
			color: var(--ink-soft);
		}

		.chip strong {
			color: var(--ink);
		}

		.game {
			position: relative;
			height: min(70vh, 620px);
			min-height: 420px;
			overflow: hidden;
			cursor: crosshair;
			background:
				linear-gradient(transparent 96%, rgba(21, 37, 31, 0.05) 96%) 0 0 / 100% 44px,
				linear-gradient(90deg, transparent 96%, rgba(21, 37, 31, 0.05) 96%) 0 0 / 44px 100%;
		}

		.target {
			position: absolute;
			width: 56px;
			height: 56px;
			border-radius: 50%;
			border: none;
			cursor: pointer;
			transform: translate(-50%, -50%) scale(0);
			animation: pop-in 0.14s ease-out forwards;
			background:
				radial-gradient(circle at 35% 35%, #ffffff 0 18%, #f6a8ba 19% 38%, #e11d48 39% 58%, #7f1d1d 59% 100%);
			box-shadow: 0 10px 16px rgba(127, 29, 29, 0.27);
		}

		.target.bad {
			background:
				radial-gradient(circle at 35% 35%, #ffffff 0 18%, #f6d7a1 19% 38%, #f59e0b 39% 58%, #78350f 59% 100%);
			box-shadow: 0 10px 16px rgba(120, 53, 15, 0.27);
		}

		.overlay {
			position: absolute;
			inset: 0;
			display: grid;
			place-items: center;
			background: rgba(12, 26, 22, 0.56);
			padding: 20px;
			text-align: center;
		}

		.panel {
			width: min(560px, 100%);
			padding: 26px 22px;
			background: #ffffff;
			border-radius: 18px;
			border: 1px solid rgba(21, 37, 31, 0.12);
			box-shadow: 0 18px 30px rgba(12, 26, 22, 0.25);
		}

		.panel h2 {
			margin-top: 0;
			margin-bottom: 10px;
			font-size: clamp(1.2rem, 2.2vw, 1.9rem);
		}

		.panel p {
			margin: 6px 0;
			color: var(--ink-soft);
		}

		.panel .result {
			font-size: 1.2rem;
			color: var(--ink);
			font-weight: 700;
			margin: 14px 0 18px;
		}

		.btn {
			border: none;
			border-radius: 999px;
			padding: 12px 20px;
			font-weight: 700;
			font-size: 1rem;
			color: #ffffff;
			background: linear-gradient(135deg, var(--accent), var(--accent-dark));
			cursor: pointer;
			transition: transform 0.15s ease, filter 0.15s ease;
		}

		.btn:hover {
			transform: translateY(-1px);
			filter: brightness(1.05);
		}

		.flash {
			position: absolute;
			transform: translate(-50%, -50%);
			font-weight: 800;
			font-size: 1.1rem;
			pointer-events: none;
			animation: float-up 0.75s ease-out forwards;
		}

		.flash.good {
			color: var(--good);
		}

		.flash.bad {
			color: var(--danger);
		}

		@keyframes pop-in {
			from {
				transform: translate(-50%, -50%) scale(0);
			}
			to {
				transform: translate(-50%, -50%) scale(1);
			}
		}

		@keyframes float-up {
			0% {
				opacity: 1;
				transform: translate(-50%, -50%) scale(0.95);
			}
			100% {
				opacity: 0;
				transform: translate(-50%, -90px) scale(1.2);
			}
		}

		@media (max-width: 640px) {
			.top {
				padding: 14px;
			}

			.game {
				min-height: 380px;
			}

			.chip {
				font-size: 0.82rem;
				padding: 7px 10px;
			}
		}
	</style>
</head>
<body>
	<main class="shell">
		<header class="top">
			<h1 class="title">Mouse Arena</h1>
			<div class="stats" aria-live="polite">
				<span class="chip">Skore: <strong id="score">0</strong></span>
				<span class="chip">Combo: <strong id="combo">0</strong></span>
				<span class="chip">Cas: <strong id="time">30</strong>s</span>
				<span class="chip">Minuty: <strong id="misses">0</strong>/8</span>
			</div>
		</header>

		<section class="game" id="gameArea" aria-label="Herni plocha"></section>

		<div class="overlay" id="overlay">
			<div class="panel" id="panelContent">
				<h2>Klikaci testovaci hra</h2>
				<p>Ovladani je pouze mysi: klikej na cervene terce a vyhybej se oranzovym.</p>
				<p>Mas 30 sekund. Hra konci i pri 8 minutych terci.</p>
				<button class="btn" id="startBtn" type="button">Spustit hru</button>
			</div>
		</div>
	</main>

	<script>
		const gameArea = document.getElementById("gameArea");
		const overlay = document.getElementById("overlay");
		const panelContent = document.getElementById("panelContent");
		const scoreEl = document.getElementById("score");
		const comboEl = document.getElementById("combo");
		const timeEl = document.getElementById("time");
		const missesEl = document.getElementById("misses");

		const state = {
			score: 0,
			combo: 0,
			misses: 0,
			timeLeft: 30,
			running: false,
			spawnTimer: null,
			gameTimer: null
		};

		function updateUi() {
			scoreEl.textContent = state.score;
			comboEl.textContent = state.combo;
			timeEl.textContent = state.timeLeft;
			missesEl.textContent = state.misses;
		}

		function clearTargets() {
			gameArea.querySelectorAll(".target, .flash").forEach((node) => node.remove());
		}

		function randomInRange(min, max) {
			return Math.floor(Math.random() * (max - min + 1)) + min;
		}

		function spawnFlash(x, y, text, kind) {
			const flash = document.createElement("span");
			flash.className = `flash ${kind}`;
			flash.style.left = `${x}px`;
			flash.style.top = `${y}px`;
			flash.textContent = text;
			gameArea.appendChild(flash);
			setTimeout(() => flash.remove(), 750);
		}

		function finishGame() {
			state.running = false;
			clearInterval(state.spawnTimer);
			clearInterval(state.gameTimer);
			clearTargets();

			overlay.hidden = false;
			const verdict = state.score >= 180 ? "Skvela trefa!" : "Dobry pokus!";
			panelContent.innerHTML = `
				<h2>Konec hry</h2>
				<p class="result">${verdict} Skore: ${state.score}</p>
				<p>Zasahy v rade (max): ${state.combo}</p>
				<p>Minute terce: ${state.misses}</p>
				<button class="btn" id="restartBtn" type="button">Hrat znovu</button>
			`;

			document.getElementById("restartBtn").addEventListener("click", startGame);
		}

		function spawnTarget() {
			if (!state.running) {
				return;
			}

			const { width, height } = gameArea.getBoundingClientRect();
			const target = document.createElement("button");
			const isBad = Math.random() < 0.2;
			const size = randomInRange(44, 64);
			const x = randomInRange(size, width - size);
			const y = randomInRange(size, height - size);
			const life = randomInRange(600, 1300);

			target.type = "button";
			target.className = isBad ? "target bad" : "target";
			target.style.width = `${size}px`;
			target.style.height = `${size}px`;
			target.style.left = `${x}px`;
			target.style.top = `${y}px`;
			target.ariaLabel = isBad ? "Spatny terc" : "Dobry terc";

			const expire = setTimeout(() => {
				if (target.isConnected) {
					target.remove();
					state.misses += 1;
					state.combo = 0;
					updateUi();
					spawnFlash(x, y, "Miss", "bad");
					if (state.misses >= 8) {
						finishGame();
					}
				}
			}, life);

			target.addEventListener("click", () => {
				clearTimeout(expire);
				target.remove();

				if (isBad) {
					state.score = Math.max(0, state.score - 18);
					state.combo = 0;
					spawnFlash(x, y, "-18", "bad");
				} else {
					state.combo += 1;
					state.score += 10 + Math.min(state.combo * 2, 20);
					spawnFlash(x, y, `+${10 + Math.min(state.combo * 2, 20)}`, "good");
				}

				updateUi();
			});

			gameArea.appendChild(target);
		}

		function startGame() {
			state.score = 0;
			state.combo = 0;
			state.misses = 0;
			state.timeLeft = 30;
			state.running = true;

			clearTargets();
			overlay.hidden = true;
			updateUi();

			clearInterval(state.spawnTimer);
			clearInterval(state.gameTimer);

			state.spawnTimer = setInterval(() => {
				spawnTarget();
			}, 360);

			state.gameTimer = setInterval(() => {
				state.timeLeft -= 1;
				updateUi();

				if (state.timeLeft <= 0) {
					finishGame();
				}
			}, 1000);
		}

		overlay.hidden = false;
		document.getElementById("startBtn").addEventListener("click", startGame);
		updateUi();
	</script>
</body>
</html>
